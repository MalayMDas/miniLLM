# Same ~25M model as pretrain_local.yaml, but trains from a LOCAL pre-tokenized
# .bin (no network during training -> no streaming timeouts). Prepare the .bin once:
#   python scripts/train_tokenizer.py --config configs/tokenizer_local.yaml
#   python scripts/prepare_data.py --tokenizer artifacts/tok_local.json --tokens 100000000
#   python scripts/pretrain.py --config configs/pretrain_local_offline.yaml --minutes 100
model:
  dim: 512
  n_layers: 8
  n_heads: 8
  n_kv_heads: 4
  max_seq_len: 512
  dropout: 0.0

tokenizer:
  mode: bpe
  path: artifacts/tok_local.json
  vocab_size: 8000

data:
  source: bin                       # read the local .bin instead of streaming
  bin_path: data/fineweb_local.bin
  block_size: 512

train:
  steps: 1000000
  time_budget_min: 100
  lr: 0.0006
  warmup_steps: 100
  weight_decay: 0.1
  grad_accum: 8
  batch_size: 8
  device: auto
  amp: true
  log_every: 20
  ckpt_every: 500
  ckpt_dir: artifacts/ckpt_pretrain_local
  seed: 1337

logging:
  backend: tensorboard
  logdir: runs
  run_name: pretrain_local_offline
