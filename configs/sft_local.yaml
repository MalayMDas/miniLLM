# Instruct SFT for the local run. init_from is injected by run_all.py (the latest
# pretrain_local checkpoint); the sample chat set is tiny — this is a demo of the
# SFT mechanics, not a capable assistant.
model:
  dim: 512
  n_layers: 8
  n_heads: 8
  n_kv_heads: 4
  max_seq_len: 512
  dropout: 0.0

tokenizer:
  mode: bpe
  path: artifacts/tok_local.json
  vocab_size: 8000

init_from: null            # set via:  python scripts/sft.py --init-from <ckpt>

data:
  chat_jsonl: data/sample_chat.jsonl
  max_len: 512

train:
  steps: 400
  time_budget_min: 10
  lr: 0.0002
  warmup_steps: 20
  weight_decay: 0.0
  grad_accum: 1
  batch_size: 4
  device: auto
  amp: true
  log_every: 20
  ckpt_every: 0
  ckpt_dir: artifacts/ckpt_sft_local
  seed: 1337

logging:
  backend: tensorboard
  logdir: runs
  run_name: sft_local
