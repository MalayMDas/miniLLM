# Tool-use SFT — same machinery as instruct SFT, just data where the assistant
# emits <tool_call> and reads a tool result. render_chat masks the user/tool turns,
# so the model learns to (a) emit the call and (b) write the final answer.
model:
  dim: 128
  n_layers: 4
  n_heads: 4
  n_kv_heads: 2
  max_seq_len: 256
  dropout: 0.0

tokenizer:
  mode: bpe
  path: artifacts/tok.json
  vocab_size: 2000

init_from: artifacts/ckpt_pretrain/step_0000200.pt

data:
  chat_jsonl: data/sample_tools_chat.jsonl
  max_len: 256

train:
  steps: 150
  lr: 0.0003
  warmup_steps: 15
  weight_decay: 0.0
  grad_accum: 1
  batch_size: 3
  device: auto
  amp: true
  log_every: 30
  ckpt_every: 0
  ckpt_dir: artifacts/ckpt_sft_tools
  seed: 1337

logging:
  backend: tensorboard
  logdir: runs
  run_name: sft_tools
